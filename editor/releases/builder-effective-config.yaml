directories:
  output: releases
  buildResources: build
appId: com.solarwire.editor
productName: SolarWire Editor
files:
  - filter:
      - dist/**/*
      - package.json
      - public/**/*
win:
  target: nsis
  icon: public/logo.ico
mac:
  target: dmg
  icon: public/logo.png
linux:
  target: AppImage
  icon: public/logo.png
electronVersion: 27.3.11
