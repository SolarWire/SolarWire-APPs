<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolarWire Editor</title>
    <link rel="icon" href="/logo.png" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: https: blob:; font-src 'self' data: https://cdn.jsdelivr.net https://unpkg.com; connect-src 'self' https:;">
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1e1e1e;
        z-index: 99999;
        transition: opacity 0.3s ease;
      }
      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 80px;
        height: 80px;
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      #splash-text {
        margin-top: 20px;
        color: rgba(255, 255, 255, 0.5);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      @keyframes splash-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-16px); }
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
    </style>
  </head>
  <body style="background:#1e1e1e">
    <div id="splash-screen">
      <img id="splash-logo" src="./logo.svg" alt="SolarWire" />
      <div id="splash-text">SolarWire Editor</div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        var check = setInterval(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            clearInterval(check);
            var splash = document.getElementById('splash-screen');
            if (splash) {
              splash.classList.add('fade-out');
              setTimeout(function() { splash.remove(); }, 300);
            }
          }
        }, 50);
      });
    </script>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
